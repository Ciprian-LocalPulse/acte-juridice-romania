name: Actualizare legislativa
description: Semnaleaza o schimbare care poate afecta un model.
title: "[Actualizare]: "
labels: ["actualizare", "verificare-necesara"]
body:
  - type: input
    id: document
    attributes:
      label: Document afectat
      placeholder: templates/locuinta/contract-inchiriere-locuinta.md
    validations:
      required: true
  - type: input
    id: sursa
    attributes:
      label: Sursa oficiala
      placeholder: https://legislatie.just.ro/...
    validations:
      required: true
  - type: textarea
    id: schimbare
    attributes:
      label: Ce s-a schimbat
      description: Explica pe scurt impactul asupra modelului.
    validations:
      required: true

